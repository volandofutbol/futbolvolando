            --bg-tertiary: #1a1f2c;

            --border-light: #2a3142;

            --accent-gold: #d4af37;
            --text-main: #eef2ff;
            --text-muted: #8f9bb3;
            --success-emerald: #10b981;
            --danger-coral: #f97316;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            background: var(--bg-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;

            line-height: 1.5;

        }

            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo-corporate {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-mark {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-gold));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark i {
            font-size: 1.6rem;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: white;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .status-corporate {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid var(--border-light);
        }

        /* Login estilo enterprise */

            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }

        .input-enterprise {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 14px 18px;
            width: 100%;
            color: white;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .input-enterprise:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(34, 102, 227, 0.2);
        }

        .btn-enterprise {
            background: var(--primary-blue);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-enterprise:hover {
            background: var(--primary-blue-dark);
            transform: translateY(-1px);
        }

        /* Dashboard profesional */
        .dashboard {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

            border-radius: var(--radius-lg);

            margin-bottom: 32px;

            justify-content: space-between;

            left: 16px;
            top: 50%;
            transform: translateY(-50%);

            padding: 12px 20px 12px 44px;
            border-radius: 40px;
            width: 100%;
            color: white;

            color: var(--danger-coral);

            width: 5px;

            background: var(--bg-tertiary);
        }

            background: var(--primary-blue);
            border-radius: 10px;

</head>

    }

    function copyToClipboardEnterprise(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).catch(() => fallbackCopyEnterprise(text));
        } else {
            fallbackCopyEnterprise(text);
        }
    }
    function fallbackCopyEnterprise(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }

    function renderCorporateChannels(filter = "") {
        const container = document.getElementById('channelsCorporateGrid');
        if (!container) return;
        container.innerHTML = "";
        const lowerFilter = filter.toLowerCase().trim();
        let hasResults = false;

        ENTERPRISE_MEDIA.forEach(category => {
            let filteredStreams = category.streams;
            if (lowerFilter) {
                filteredStreams = category.streams.filter(s => s.name.toLowerCase().includes(lowerFilter) || category.name.toLowerCase().includes(lowerFilter));
            }
            if (filteredStreams.length === 0) return;
            hasResults = true;
            const card = document.createElement('div');
            card.className = 'category-card-corp';
            card.innerHTML = `
                <div class="card-header-corp">
                    <h3><i class="${category.icon}" style="color: ${category.color};"></i> ${category.name}</h3>
                    <span class="badge-corp">${filteredStreams.length}</span>
                </div>
                <div class="stream-list-corp">
                    ${filteredStreams.map(stream => `
                        <div class="stream-item-corp" onclick="openEnterpriseStreamModal('${stream.id.replace(/'/g, "\\'")}', '${stream.name.replace(/'/g, "\\'")}', '${stream.quality}')">
                            <div class="stream-info-corp">
                                <i class="fas fa-play-circle" style="color: var(--primary-blue);"></i>
                                <div>
                                    <div style="font-weight: 600;">${stream.name}</div>
                                    <div style="font-size: 0.7rem; color: var(--text-muted);">${stream.id.substring(0,12)}...</div>
                                </div>
                            </div>
                            <span class="quality-badge-corp">${stream.quality}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(card);
        });
        if (!hasResults) {
            container.innerHTML = `<div class="empty-state-corp"><i class="fas fa-search" style="font-size: 2.5rem; opacity: 0.5;"></i><h3 style="margin-top: 16px;">Sin resultados</h3><p>No se encontraron coincidencias para "${filter}"</p></div>`;
        }
    }

    function loginEnterprise() {
        const user = document.getElementById('corpUsername').value.trim();
        const pass = document.getElementById('corpPassword').value.trim();
        const errorDiv = document.getElementById('loginErrorMsg');
        if (CORP_CREDENTIALS[user] && CORP_CREDENTIALS[user] === pass) {
            activeSessionUser = user;
            document.getElementById('authContainer').style.display = 'none';
            const dashboard = document.getElementById('corporateDashboard');
            dashboard.style.display = 'block';
            document.getElementById('userNameDisplay').innerHTML = `${user.toUpperCase()} <span style="font-size:0.7rem;">• Enterprise</span>`;
            document.getElementById('userAvatarCorp').innerHTML = user.charAt(0).toUpperCase();
            document.getElementById('globalStatusIndicator').innerHTML = `<i class="fas fa-shield-haltered"></i> <span>ACTIVE · ${user}</span>`;
            renderCorporateChannels('');
            const searchInput = document.getElementById('searchCorporateInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => renderCorporateChannels(e.target.value));
            }
            showCorporateToast(`Bienvenido ${user} · Plataforma empresarial activa`);
        } else {
            errorDiv.innerText = "❌ Acceso denegado · Credenciales inválidas";
            setTimeout(() => errorDiv.innerText = "", 2800);
        }
    }

    function logoutCorporate() {
        if (confirm("¿Finalizar sesión empresarial?")) {
            location.reload();
        }
    }

    window.openEnterpriseStreamModal = openEnterpriseStreamModal;
    document.getElementById('enterpriseLoginBtn')?.addEventListener('click', loginEnterprise);
    document.getElementById('logoutCorporateBtn')?.addEventListener('click', logoutCorporate);

    // Estadísticas en consola
    const totalStreamsCount = ENTERPRISE_MEDIA.reduce((acc, cat) => acc + cat.streams.length, 0);
    console.log(`[FUTVOL 97] Plataforma Enterprise cargada · ${totalStreamsCount} streams disponibles · Modo corporativo`);
</script>
</body>
</html>
