    function updateTotalCounter() {
        let total = FULL_CHANNELS.reduce((acc, cat) => acc + cat.links.length, 0);
        document.getElementById('totalStreamsCount').innerText = total;
    }

    function renderChannels(filterText = "") {
        const container = document.getElementById('channelsGrid');
        if (!container) return;
        container.innerHTML = "";
        const searchLower = filterText.toLowerCase().trim();
        
        FULL_CHANNELS.forEach(category => {
            let filteredLinks = category.links;
            if (searchLower !== "") {
                filteredLinks = category.links.filter(link => 
                    link.name.toLowerCase().includes(searchLower) || 
                    category.title.toLowerCase().includes(searchLower)
                );
            }
            if (filteredLinks.length === 0) return;
            
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `
                <div class="card-header">
                    <h3><i class="${category.icon}"></i> ${category.title}</h3>
                    <span class="badge-count">${filteredLinks.length}</span>
                </div>
                <div class="links-list">
                    ${filteredLinks.map(link => `
                        <div class="stream-item" onclick="openStreamModal('${link.id}', '${link.name.replace(/'/g, "\\'")}', '${link.type}')">
                            <div class="stream-info">
                                <i class="fas fa-play-circle"></i>
                                <div>
                                    <div class="stream-name">${link.name}</div>
                                    <div class="stream-type">${link.type} · ${link.id.substring(0, 10)}...</div>
                                </div>
                            </div>
                            <div class="stream-arrow"><i class="fas fa-chevron-right"></i></div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(card);
        });
        if (container.children.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 60px;"><i class="fas fa-search" style="font-size: 3rem;"></i><p>No se encontraron resultados para "${filterText}"</p></div>`;
        }
    }

    function openStreamModal(streamId, streamName, quality) {
        if (!streamId) return;
        activeUserId = streamId;
        if (modalElement) modalElement.remove();
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-full';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <i class="fas fa-film" style="font-size: 2rem; color: var(--neon-green);"></i>
                <h3 style="margin-top: 10px;">${streamName}</h3>
                <p style="color: #9ec8ff;">${quality} · AceStream ID</p>
                <div class="acestream-id">${streamId}</div>
                <div class="flex-btns">
                    <button class="modal-btn primary" id="modalOpenBtn"><i class="fab fa-accesstoken"></i> Abrir AceStream</button>
                    <button class="modal-btn" id="modalCopyBtn"><i class="fas fa-copy"></i> Copiar ID</button>
                </div>
                <button class="close-modal" id="modalCloseBtn">Cerrar</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalElement = modalDiv;
        document.body.style.overflow = 'hidden';
        
        document.getElementById('modalOpenBtn').onclick = () => {
            const aceUrl = `acestream://${streamId}`;
            window.location.href = aceUrl;
            showToast(`Abriendo ${streamName} en AceStream...`, true);
            setTimeout(() => closeModal(), 800);
        };
        document.getElementById('modalCopyBtn').onclick = () => {
            copyToClipboard(streamId);
            showToast(`ID copiado: ${streamId.substring(0,12)}...`, true);
            setTimeout(() => closeModal(), 1200);
        };
        document.getElementById('modalCloseBtn').onclick = () => closeModal();
        modalDiv.addEventListener('click', (e) => { if(e.target === modalDiv) closeModal(); });
    }
    
    function copyToClipboard(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
    }
    
    function closeModal() {
        if (modalElement) modalElement.remove();
        modalElement = null;
        document.body.style.overflow = '';
    }
    
    function handleLogin() {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const errorDiv = document.getElementById('loginError');
        if (USERS_AUTH[user] === pass) {
            currentUserLogged = user;
            document.getElementById('authSection').style.display = 'none';
            const dashboard = document.getElementById('dashboardApp');
            dashboard.style.display = 'block';
            document.getElementById('welcomeUser').innerHTML = `${user.toUpperCase()} <i class="fas fa-check-circle" style="color: #00f5a0;"></i>`;
            document.getElementById('userAvatar').innerText = user.charAt(0).toUpperCase();
            document.getElementById('sysBadge').innerHTML = `<i class="fas fa-circle" style="color: #00f5a0; font-size: 0.7rem;"></i> SESIÓN ACTIVA`;
            renderChannels('');
            updateTotalCounter();
            const searchBox = document.getElementById('searchInput');
            if(searchBox) {
                searchBox.addEventListener('input', (e) => renderChannels(e.target.value));
            }
            showToast(`Bienvenido ${user} · Acceso total a todos los enlaces`, true);
        } else {
            errorDiv.innerText = "❌ ACCESO DENEGADO · Credenciales inválidas";
            setTimeout(() => { errorDiv.innerText = ""; }, 3000);
            const inputs = document.querySelectorAll('#loginUser, #loginPass');
            inputs.forEach(inp => inp.style.animation = 'shake 0.4s');
            setTimeout(() => inputs.forEach(inp => inp.style.animation = ''), 500);
        }
    }
    
    function logout() {
        if(confirm("¿Finalizar sesión premium?")) {
            location.reload();
        }
    }
    
    window.openStreamModal = openStreamModal;
    window.handleLogin = handleLogin;
    window.logout = logout;
    window.copyToClipboard = copyToClipboard;
    
    updateTotalCounter();
</script>
</body>
</html>
